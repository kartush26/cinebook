default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default

test:
  <<: *default
  database: cinebook_test
  url: <%= ENV.fetch('DATABASE_URL', 'postgres://postgres:postgres@localhost:5432/cinebook_test') %>

production:
  <<: *default
