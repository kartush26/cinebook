require:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - 'bin/*'
    - 'db/schema.rb'
    - 'db/migrate/**'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'storage/**/*'

Style/Documentation: { Enabled: false }
Style/FrozenStringLiteralComment: { Enabled: false }
Metrics/ClassLength: { Max: 200 }
Metrics/MethodLength: { Max: 30 }
Metrics/AbcSize: { Max: 40 }
Metrics/BlockLength:
  AllowedMethods: [describe, context, it, define, configure, draw, scope]
Layout/LineLength: { Max: 140 }
RSpec/MultipleExpectations: { Max: 5 }
RSpec/ExampleLength: { Max: 20 }
